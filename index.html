<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Puffs Bramalea - Display</title>
    <style>
        :root {
            --primary: #ff6600;
            --dark: #111111;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Slideshow Container - Auto Adjusts */
        .slideshow-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 9s linear;
            /* contain ensures the whole poster is always visible regardless of screen shape */
            object-fit: contain; 
            transform: scale(1);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1.08); /* Reduced zoom slightly for better fit */
        }

        /* Bottom QR Action Bar - Responsive Flex */
        .bottom-bar {
            background: rgba(0, 0, 0, 0.95);
            border-top: 3px solid var(--primary);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            z-index: 10;
            flex-wrap: wrap; /* Allows cards to wrap on small screens */
            gap: 15px;
        }

        .qr-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 102, 0, 0.3);
            flex: 1;
            min-width: 280px; /* Prevents cards from getting too squished */
            max-width: 400px;
        }

        .qr-item img {
            width: clamp(70px, 10vw, 100px); /* Adjusts size based on screen width */
            height: auto;
            background: white;
            padding: 5px;
            border-radius: 5px;
            flex-shrink: 0;
        }

        .qr-info {
            text-align: left;
            overflow: hidden;
        }

        .qr-info h2 {
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            color: var(--primary);
            margin-bottom: 3px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .qr-info p {
            font-size: clamp(0.75rem, 1.2vw, 0.9rem);
            color: #ccc;
            margin-bottom: 5px;
        }

        .click-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .vip-item {
            border: 2px solid var(--white);
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
        }

        /* Responsive Mobile Tweak */
        @media (max-height: 600px) {
            .bottom-bar { min-height: 120px; padding: 5px; }
            .qr-item { padding: 5px 10px; }
            .qr-item img { width: 60px; }
        }
    </style>
</head>
<body>

    <div class="slideshow-container" id="slideshow">
        <img class="slide active" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/3-Instagram-story_Cluster_1080x1920-EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/EASTER%20Promo_%20STORY%20-%20EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Maple%20Creme-%20POST-%20EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/MiniEgg_EN_Story.jpg?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_1080x1920.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_Poutine_EN.png?raw=true">
    </div>

    <div class="bottom-bar">
        <div class="qr-item vip-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://kspatel45.github.io/Mr-Puffs-Bramalea/" alt="Spin QR">
            <div class="qr-info">
                <h2>🔥 Spin & Win</h2>
                <p>Unlock Extra Offers</p>
                <a href="https://kspatel45.github.io/Mr-Puffs-Bramalea/" class="click-btn">Click to Spin</a>
            </div>
        </div>

        <div class="qr-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.instagram.com/mrpuffs_bramalea_brampton?igsh=dnVjbHVwbTU3cGU=" alt="IG QR">
            <div class="qr-info">
                <h2>Follow Us</h2>
                <p>@mrpuffsbramalea</p>
            </div>
        </div>

        <div class="qr-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.google.com/search?sca_esv=17de63e8a22fe1ba&sxsrf=ANbL-n7cnokqltj56MytoOOLzbpj0LUtrQ:1776824898146&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOV-MgTjHbHHY51vNdOcDhnvDz0IT3KfbWk15NkKcPTLwW9H8zBeR_GCR9817Wh0FIP4lrOtWQ88qrlxnUO3UOC2ppaGD&q=Mr.+Puffs+Reviews&sa=X&ved=2ahUKEwjO84bHtICUAxXSTGwGHWCaNQcQ0bkNegQILxAH&biw=1699&bih=901&dpr=1.5&zx=1776824914998" alt="Review QR">
            <div class="qr-info">
                <h2>Rate Us</h2>
                <p>Leave a 5-Star Review</p>
            </div>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const intervalTime = 9000;

        function nextSlide() {
            slides[currentSlide].style.transform = "scale(1)";
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, intervalTime);
    </script>
</body>
</html>
