<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Puffs Bramalea - Display</title>
    <style>
        :root {
            --primary: #ff6600;
            --dark: #111111;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Slideshow Container */
        .slideshow-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            /* Transition for both Opacity and the Zoom effect */
            transition: opacity 1.5s ease-in-out, transform 9s linear;
            object-fit: contain;
            transform: scale(1); /* Starting scale */
        }

        .slide.active {
            opacity: 1;
            transform: scale(1.1); /* Slow zoom in effect over 9 seconds */
        }

        /* Bottom QR Action Bar */
        .bottom-bar {
            background: rgba(0, 0, 0, 0.9);
            border-top: 3px solid var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 180px;
            z-index: 10; /* Ensure bar stays above zooming images */
        }

        .qr-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 102, 0, 0.3);
            flex: 1;
            margin: 0 10px;
            max-width: 400px;
        }

        .qr-item img {
            width: 100px;
            height: 100px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }

        .qr-info {
            text-align: left;
        }

        .qr-info h2 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .qr-info p {
            font-size: 0.9rem;
            color: #ccc;
        }

        .click-btn {
            display: inline-block;
            margin-top: 8px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .vip-item {
            border: 2px solid var(--white);
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="slideshow-container" id="slideshow">
        <img class="slide active" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/3-Instagram-story_Cluster_1080x1920-EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/EASTER%20Promo_%20STORY%20-%20EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Maple%20Creme-%20POST-%20EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/MiniEgg_EN_Story.jpg?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_1080x1920.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_EN.png?raw=true">
        <img class="slide" src="https://github.com/kspatel45/Mr-Puffs-Bramalea/blob/main/Story_Poutine_EN.png?raw=true">
    </div>

    <div class="bottom-bar">
        <div class="qr-item vip-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://kspatel45.github.io/Mr-Puffs-Bramalea/" alt="Spin QR">
            <div class="qr-info">
                <h2>🔥 Spin & Win</h2>
                <p>Unlock Extra Offers</p>
                <a href="https://kspatel45.github.io/Mr-Puffs-Bramalea/" target="_blank" class="click-btn">Click to Spin</a>
            </div>
        </div>

        <div class="qr-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.instagram.com/mr.puffs.bramalea?igsh=dnVjbHVwbTU3cGU=" alt="IG QR">
            <div class="qr-info">
                <h2>Follow Us</h2>
                <p>@mrpuffsbramalea</p>
            </div>
        </div>

        <div class="qr-item">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mrpuffs.com/" alt="Review QR">
            <div class="qr-info">
                <h2>Rate Us</h2>
                <p>Leave a 5-Star Review</p>
            </div>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const intervalTime = 9000;

        function nextSlide() {
            // Reset the scale of the slide that is about to hide so it can zoom again later
            slides[currentSlide].style.transform = "scale(1)";
            slides[currentSlide].classList.remove('active');
            
            currentSlide = (currentSlide + 1) % slides.length;
            
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, intervalTime);
    </script>
</body>
</html>
